<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — Root Bone Films</title>
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-section">
        <a class="logo" href="index.html">
          <img src="media/templogo.png" alt="logo">
        </a>
        <span class="logo-text">Root Bone Films</span>
      </div>
      <nav class="site-nav">
        <a href="work.html">Work</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="social-icons">
        <a href="https://youtube.com" target="_blank" title="YouTube"><i class="fa-brands fa-youtube"></i></a>
        <a href="https://instagram.com" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://linkedin.com" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
        <a href="https://artstation.com" target="_blank" title="ArtStation"><i class="fa-brands fa-artstation"></i></a>
      </div>
      <button class="nav-toggle" aria-label="Toggle menu">☰</button>
    </div>
  </header>

  <main>
    <section class="contact-section">
      <div class="contact-image-container">
        <img src="media/portraittemp.png" alt="Portrait" class="contact-portrait">
      </div>

      <div class="contact-form-container">
        <h1 class="contact-title">Contact</h1>
        
        <div class="form-wrapper">
          <h2 class="form-heading">SAY <span>HELLO!</span></h2>
          
          <form id="nativeContactForm" action="https://formspree.io/f/maqzpdrp" method="POST">
            <input type="hidden" name="_subject" value="Root Bone Films contact form submission">
            <div class="input-group">
              <input type="text" id="name" name="name" placeholder=" " required>
              <label for="name">Name*</label>
            </div>
            
            <div class="input-group">
              <input type="email" id="email" name="_replyto" placeholder=" " required>
              <label for="email">Email*</label>
            </div>
            
            <div class="input-group">
              <input type="text" id="subject" name="subject" placeholder=" " required>
              <label for="subject">Subject*</label>
            </div>
            
            <div class="input-group">
              <textarea id="message" name="message" rows="1" placeholder=" " required></textarea>
              <label for="message">Message*</label>
            </div>
            
            <button type="submit" class="btn-send">SEND</button>
            <p id="contactMsg" class="hidden" role="status" aria-live="polite"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; <span id="year-c"></span> Root Bone Films</p>
      <a href="index.html" class="custom-reel-btn">Back</a>
      <div class="social-icons">
        <a href="https://youtube.com" target="_blank" title="YouTube"><i class="fa-brands fa-youtube"></i></a>
        <a href="https://instagram.com" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://linkedin.com" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
        <a href="https://artstation.com" target="_blank" title="ArtStation"><i class="fa-brands fa-artstation"></i></a>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
